<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylemedarbetare.css">
</head>

<body>
    <a href="om.html">← Tillbaka</a>

    <div id="auth-view">
        <h1>Inloggning</h1>
        <input id="username" type="text" placeholder="Användarnamn">
        <input id="password" type="password" placeholder="Lösenord">
        <button onclick="login()">Logga in</button>

        <p id="msg"></p>
    </div>

    <div id="dashboard" style="display: none;">
        <h1>Medarbetarportalen</h1>
        <button onclick="logout()">Logga ut</button>
        <p id="welcome"></p>


        <hr>

        <form id="itemform">
            <h3>Lägg till ny Item</h3>
            <input type="text" id="name" placeholder="Namn" required>
            <input id="description" placeholder="Beskrivning" required></input>
            <button type="submit">Lägg till</button>
            <p id="message"></p>
        </form>


        <hr>
        <div id="datalist"></div>


        <div id="edit-form-container" style="display: none;">
            <h3>Redigera item</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="Namn">
            <input id="edit-description" placeholder="Beskrivning"></input>
            <button onclick="submitUpdate()">Spara ändringar</button>
            <button onclick="closeEditForm()">Avbryt</button>
        </div>
    </div>

    <script src="client.js" defer></script>
</body>

</html>
